name: Publish

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: "4.0"
        bundler-cache: true
    - name: Compile template
      run: bundle exec bin/rbytes compile template/generator.rb > template.rb
    - name: Push to dist branch
      run: |
        cd "$(mktemp -d)"
        git init
        git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
        cp "$GITHUB_WORKSPACE/template.rb" template.rb
        git add template.rb
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git commit -m "Compiled from ${GITHUB_SHA::8}"
        git push --force origin HEAD:refs/heads/dist

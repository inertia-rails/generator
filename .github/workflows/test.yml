name: Test

on:
  push:
    branches:
    - main
  pull_request:
  schedule:
    - cron: "10 4 * * */2"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 3
      CI: true
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4", "4.0"]
    steps:
    - uses: actions/checkout@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - name: Compile and test
      run: bundle exec rake compile test:isolated
    - name: Lint
      run: bundle exec standardrb

  e2e:
    runs-on: ubuntu-latest
    needs: test
    env:
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 3
      CI: true
    steps:
    - uses: actions/checkout@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: "3.4"
        bundler-cache: true
    - uses: actions/setup-node@v4
      with:
        node-version: "22"
    - name: Install Rails
      run: gem install railties
    - name: Run e2e tests
      run: bundle exec rake test:e2e
      timeout-minutes: 15

  existing-apps:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
        - rails: latest
          ruby: "3.4"
        # Declared floor for existing-app installs
        - rails: "7.2"
          ruby: "3.3"
    env:
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 3
      CI: true
    steps:
    - uses: actions/checkout@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - uses: actions/setup-node@v4
      with:
        node-version: "22"
    - name: Install Rails
      run: |
        if [ "${{ matrix.rails }}" = "latest" ]; then
          gem install railties
        else
          gem install railties -v "~> ${{ matrix.rails }}.0"
        fi
    - name: Run existing-app install tests
      run: bundle exec rake test:existing
      timeout-minutes: 25
